{% set version = "2.2.3" %}
{% set python_min = "3.11" %}


package:
  name: astro-gdt
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/astro-gdt/astro_gdt-{{ version }}.tar.gz
  sha256: 6023d456a83bebce6eb8cbf50b9b099ba549776a7f66a576e6afcfd107b8e781

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python
  number: 0



requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - pyproj >=1.9.6
    - numpy >=2.2.3
    - scipy ==1.15.2
    - astropy-base >=7.0.0
    - matplotlib-base >=3.10.0,<3.11.dev0
    - healpy >=1.18.0,<1.19.dev0
    - cartopy >=0.21.1
    - rich >=13.3.3

test:
  imports:
    - gdt
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://astro-gdt.readthedocs.io/
  summary: 'Gamma-ray Data Tools: Core Components'
  doc_url: https://astro-gdt.readthedocs.io/
  dev_url: https://github.com/USRA-STI/gdt-core
  license: Apache-2.0
  license_file:
    - NOTICE
    - license.txt

extra:
  recipe-maintainers:
    - zoghbi-a
